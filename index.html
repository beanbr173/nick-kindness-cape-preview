<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick and the Kindness Cape — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cape: #ffd166;
      --hero-blue: #7ec8ff;
      --ink: #2d3436;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    body.lang-pending .app-header,
    body.lang-pending .book-shell,
    body.lang-pending .nav-bar { visibility: hidden; pointer-events: none; }

    .lang-gate {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    }

    .lang-gate.hidden { display: none; }

    .lang-card {
      width: min(420px, 94vw);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .lang-card .cover-mini {
      width: 56%;
      border-radius: 10px;
      margin-bottom: 1.25rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .lang-card h2 {
      font-family: "Fredoka", sans-serif;
      font-size: clamp(1.4rem, 4vw, 1.75rem);
      margin-bottom: 0.35rem;
    }

    .lang-card .lang-prompt {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-bottom: 1.5rem;
    }

    .lang-card .lang-prompt-es {
      font-size: 0.9rem;
      opacity: 0.65;
      margin-bottom: 1.5rem;
      margin-top: -1rem;
    }

    .lang-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .lang-buttons button {
      font-family: "Fredoka", sans-serif;
      font-size: 1.05rem;
      padding: 0.85rem 1.25rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .lang-buttons button:active { transform: scale(0.97); }

    .btn-lang-en {
      background: var(--cape);
      color: var(--ink);
      font-weight: 600;
    }

    .btn-lang-es {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.25) !important;
      font-weight: 600;
    }

    .btn-lang-es:hover { background: rgba(255,255,255,0.22); }

    .app-header {
      text-align: center;
      padding: 1.25rem 1rem 0.5rem;
    }

    .app-header h1 {
      font-family: "Fredoka", sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 600;
      opacity: 0.95;
    }

    .app-header p {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }

    .header-actions {
      margin-top: 0.6rem;
    }

    .btn-change-lang {
      font-family: "Fredoka", sans-serif;
      font-size: 0.78rem;
      padding: 0.35rem 0.85rem;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
    }

    .btn-change-lang:hover { background: rgba(255,255,255,0.18); }

    .book-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 6rem;
      gap: 1rem;
    }

    .page-counter {
      font-family: "Fredoka", sans-serif;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.12);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }

    .book-page {
      display: none;
      width: min(720px, 94vw);
      aspect-ratio: 4 / 5;
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      overflow: hidden;
      position: relative;
      animation: pageIn 0.45s ease;
    }

    .book-page.active { display: block; }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .page-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .page-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
    }

    .page-overlay.top {
      justify-content: flex-start;
      background: linear-gradient(to bottom, rgba(15,20,40,0.82) 0%, rgba(15,20,40,0.45) 40%, transparent 65%);
    }

    .page-overlay.bottom {
      background: linear-gradient(to top, rgba(15,20,40,0.88) 0%, rgba(15,20,40,0.55) 38%, rgba(15,20,40,0.15) 58%, transparent 72%);
    }

    .page-overlay.center {
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to top, rgba(15,20,40,0.85) 0%, rgba(15,20,40,0.35) 45%, rgba(15,20,40,0.35) 55%, rgba(15,20,40,0.85) 100%);
    }

    .page-text {
      padding: 1.1rem 1.35rem 1.5rem;
    }

    .page-overlay.top .page-text {
      padding: 1.6rem 1.35rem 1rem;
    }

    .page-overlay.center .page-text {
      padding: 1.5rem;
      max-width: 90%;
    }

    .page-text p {
      font-size: clamp(0.92rem, 2.5vw, 1.12rem);
      line-height: 1.62;
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.65), 0 1px 2px rgba(0,0,0,0.8);
    }

    .page-text .emphasis {
      font-family: "Fredoka", sans-serif;
      font-weight: 700;
      color: var(--cape);
    }

    .title-block h2 {
      font-family: "Fredoka", sans-serif;
      font-size: clamp(1.55rem, 5vw, 2.35rem);
      line-height: 1.12;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    .title-block .subtitle {
      font-size: clamp(0.88rem, 2.4vw, 1.05rem);
      margin-top: 0.5rem;
      font-weight: 700;
      opacity: 0.95;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    .title-block .byline {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      opacity: 0.75;
    }

    .end-block h2 {
      font-family: "Fredoka", sans-serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      text-shadow: 0 3px 12px rgba(0,0,0,0.6);
      margin-bottom: 0.75rem;
    }

    .end-block .end-stars {
      margin-top: 1rem;
      font-size: 1.6rem;
      letter-spacing: 0.25rem;
    }

    .page-number {
      position: absolute;
      bottom: 0.45rem;
      right: 0.65rem;
      font-family: "Fredoka", sans-serif;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      z-index: 2;
    }

    .nav-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: rgba(15, 20, 40, 0.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
    }

    .nav-bar button {
      font-family: "Fredoka", sans-serif;
      font-size: 1rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .nav-bar button:active { transform: scale(0.96); }

    .btn-prev, .btn-next {
      background: var(--cape);
      color: var(--ink);
      font-weight: 600;
      min-width: 110px;
    }

    .btn-prev:disabled, .btn-next:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-grid {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 0.85rem !important;
      padding: 0.65rem 1rem !important;
    }

    .page-dots {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 200px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active {
      background: var(--cape);
      transform: scale(1.3);
    }

    .thumb-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      padding: 2rem;
      overflow-y: auto;
    }

    .thumb-panel.open { display: block; }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 0.75rem;
      max-width: 820px;
      margin: 0 auto;
    }

    .thumb {
      aspect-ratio: 4/5;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb span {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-family: "Fredoka", sans-serif;
      font-size: 0.7rem;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    .thumb:hover { border-color: var(--cape); transform: scale(1.04); }
    .thumb.current { border-color: var(--cape); }

    .thumb-close {
      display: block;
      margin: 0 auto 1.5rem;
      background: #fff;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 999px;
      font-family: "Fredoka", sans-serif;
      cursor: pointer;
    }

    @media (max-width: 500px) {
      .page-text { padding: 0.9rem 1rem 1.2rem; }
      .nav-bar { gap: 0.5rem; padding: 0.75rem; }
      .btn-prev, .btn-next { min-width: 90px; font-size: 0.9rem; }
    }
  </style>
</head>

<script>
  const I18N = {
    en: {
      docTitle: 'Nick and the Kindness Cape — Preview',
      headerTitle: '📖 Book Preview',
      headerSubtitle: 'Nick and the Kindness Cape · 17 pages · Ages 4–8',
      changeLang: '🌐 Language',
      pageCounter: (n, t) => `Page ${n} of ${t}`,
      nav_prev: '← Prev',
      nav_next: 'Next →',
      nav_pages: 'Pages',
      nav_close: 'Close',
      p1_title: 'Nick and the<br>Kindness Cape',
      p1_subtitle: 'A Superhero Story About Heart',
      p1_byline: 'Preview Edition',
      p2: 'In the sunny town of <span class="emphasis">Bright Hollow</span>, lived an ordinary boy named Nick. He rode his red bike, fed the pigeons, and dreamed of doing something <span class="emphasis">extraordinary</span>.',
      p3: 'One rainy afternoon, Nick explored the dusty attic. Behind an old trunk, something <span class="emphasis">glimmered</span>—a golden cape with a star that seemed to wink at him.',
      p4: 'Nick tied the cape around his shoulders. The star glowed warm and bright. The floor dropped away and—<span class="emphasis">WHOOSH!</span>—he lifted off like a balloon set free.',
      p5: '"I\'m flying!" Nick cheered—until he bonked into an oak tree. Leaves rained down. A squirrel shook its fist. Being a superhero, Nick learned, takes <span class="emphasis">practice</span>.',
      p6: 'A kind old hero appeared—<span class="emphasis">Captain Compass</span>, retired but wise. "Every great hero stumbles," he smiled. "The cape chose you because of what\'s in your heart, not your height."',
      p7: 'Captain Compass taught Nick to hover, swoop, and land softly. "Real power," he said, "isn\'t about being the strongest. It\'s about being the <span class="emphasis">bravest helper</span> you can be."',
      p8: 'That evening, the Hero Beacon blazed red over Bright Hollow. <span class="emphasis">Someone needs help!</span> Nick\'s cape fluttered. This was his moment. His very first real mission.',
      p9: 'At Maple Park, Mrs. Patel pointed up at a tree. "My kitten, Whiskers, is stuck!" Whiskers mewed sadly from the highest branch. Nick rolled up his sleeves—or rather, his cape.',
      p10: 'Nick flew up and tried to <span class="emphasis">grab</span> the kitten. Whiskers scrambled higher. Nick tried a super-loud shout. Whiskers hid behind a leaf. Nothing worked!',
      p11: 'Nick took a deep breath. He spoke softly: "It\'s okay, little one. I\'m here to help, not hurt you." He held out his hand and waited, patient as sunshine.',
      p12: 'Whiskers sniffed, stepped forward, and curled into Nick\'s arms. Mrs. Patel cheered. Nick had saved the day—not with force, but with <span class="emphasis">gentleness</span>. His star glowed brighter than ever.',
      p13: 'But across town, a shadow grumbled. <span class="emphasis">Grumpy Grumble</span> fed on frowns and fussing. "Joy belongs to ME!" he bellowed, stealing smiles from the playground.',
      p14: 'Nick didn\'t go alone. His friends arrived—<span class="emphasis">Bolt Ben</span>, <span class="emphasis">Star Sasha</span>, and <span class="emphasis">Captain Kindness Kit</span>—each wearing a cape of a different color. Together, they were the Heart Squad!',
      p15: 'The Heart Squad didn\'t punch or zap. They shared toys, told jokes, and helped Grumble\'s torn cape. Slowly, his purple frown turned pink. "Nobody ever helped <span class="emphasis">me</span> before," he whispered.',

      p2: 'En el soleado pueblo de <span class="emphasis">Valle Brillante</span>, vivía un niño común llamado Nick. Montaba su bicicleta roja, alimentaba a las palomas y soñaba con hacer algo <span class="emphasis">extraordinario</span>.',
      p3: 'Una tarde lluviosa, Nick exploró el ático polvoriento. Detrás de un viejo baúl, algo <span class="emphasis">brilló</span>: una capa dorada con una estrella que parecía guiñarle.',

      p7: 'El Capitán Brújula enseñó a Nick a flotar, surcar y aterrizar suavemente. "El verdadero poder," dijo, "no es ser el más fuerte. Es ser el <span class="emphasis">ayudante más valiente</span> que puedas ser."',
      p8: 'Esa noche, la Baliza del Héroe ardió roja sobre Valle Brillante. <span class="emphasis">¡Alguien necesita ayuda!</span> La capa de Nick ondeó. Este era su momento. Su primera misión de verdad.',
      p9: 'En el Parque Arce, la señora Patel señaló un árbol. "¡Mi gatito, Whiskers, está atrapado!" Whiskers maulló tristemente desde la rama más alta. Nick se arremangó—bueno, se ajustó la capa.',

      p12: 'Whiskers olfateó, dio un paso adelante y se acurrucó en los brazos de Nick. La señora Patel aplaudió. Nick había salvado el día—no con fuerza, sino con <span class="emphasis">gentileza</span>. Su estrella brilló más que nunca.',
      p13: 'Pero al otro lado del pueblo, una sombra gruñó. <span class="emphasis">Gruñón Quejón</span> se alimentaba de frunces y quejas. "¡La alegría me pertenece a MÍ!" rugió, robando sonrisas del parque.',

  let lang = null;
  let current = 1;
  const total = 17;

  const pages = document.querySelectorAll('.book-page');
  const counter = document.getElementById('pageCounter');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnGrid = document.getElementById('btnGrid');
  const btnCloseGrid = document.getElementById('btnCloseGrid');
  const thumbPanel = document.getElementById('thumbPanel');
  const thumbGrid = document.getElementById('thumbGrid');
  const dotsContainer = document.getElementById('pageDots');
  const langGate = document.getElementById('langGate');

  function applyLanguage(code) {
    lang = code;
    const t = I18N[code];
    document.documentElement.lang = code;
    document.title = t.docTitle;
    document.getElementById('headerTitle').textContent = t.headerTitle;
    document.getElementById('headerSubtitle').textContent = t.headerSubtitle;
    document.getElementById('btnChangeLang').textContent = t.changeLang;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) {
        if (key.startsWith('nav_')) el.textContent = t[key];
        else el.innerHTML = t[key];
      }
    });

    pages.forEach(page => {
      const n = +page.dataset.page;
      const img = page.querySelector('.page-bg');
      if (img && t.alts[n]) img.alt = t.alts[n];
    });

    updatePageCounter();
  }

  function updatePageCounter() {
    counter.textContent = I18N[lang].pageCounter(current, total);
  }

  function selectLanguage(code) {
    applyLanguage(code);
    langGate.classList.add('hidden');
    document.body.classList.remove('lang-pending');
  }

  function showLanguageGate() {
    langGate.classList.remove('hidden');
    document.body.classList.add('lang-pending');
  }

  document.getElementById('btnLangEn').addEventListener('click', () => selectLanguage('en'));
  document.getElementById('btnLangEs').addEventListener('click', () => selectLanguage('es'));
  document.getElementById('btnChangeLang').addEventListener('click', showLanguageGate);

  pages.forEach(page => {
    const n = +page.dataset.page;
    const thumbSrc = page.dataset.thumb;

    const dot = document.createElement('span');
    dot.className = 'dot' + (n === 1 ? ' active' : '');
    dot.dataset.page = n;
    dot.addEventListener('click', () => goTo(n));
    dotsContainer.appendChild(dot);

    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (n === 1 ? ' current' : '');
    thumb.dataset.page = n;
    thumb.innerHTML = '<img src="' + thumbSrc + '" alt=""><span>' + n + '</span>';
    thumb.addEventListener('click', () => { goTo(n); thumbPanel.classList.remove('open'); });
    thumbGrid.appendChild(thumb);
  });

  function goTo(n) {
    current = Math.max(1, Math.min(total, n));
    pages.forEach(p => p.classList.toggle('active', +p.dataset.page === current));
    document.querySelectorAll('.dot').forEach(d => d.classList.toggle('active', +d.dataset.page === current));
    document.querySelectorAll('.thumb').forEach(t => t.classList.toggle('current', +t.dataset.page === current));
    if (lang) updatePageCounter();
    btnPrev.disabled = current === 1;
    btnNext.disabled = current === total;
  }

  btnPrev.addEventListener('click', () => goTo(current - 1));
  btnNext.addEventListener('click', () => goTo(current + 1));
  btnGrid.addEventListener('click', () => thumbPanel.classList.add('open'));
  btnCloseGrid.addEventListener('click', () => thumbPanel.classList.remove('open'));
  thumbPanel.addEventListener('click', e => { if (e.target === thumbPanel) thumbPanel.classList.remove('open'); });

  document.addEventListener('keydown', e => {
    if (langGate.classList.contains('hidden') === false) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
    if (e.key === 'Escape') thumbPanel.classList.remove('open');
  });

  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
  document.addEventListener('touchend', e => {
    if (langGate.classList.contains('hidden') === false) return;
    const diff = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(diff) > 50) goTo(current + (diff < 0 ? 1 : -1));
  }, { passive: true });
</script>
